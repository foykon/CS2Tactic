services:
  postgres:
    image: postgres:16
    container_name: cs2tactic_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - cs2tactic_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cs2tactic_redis
    ports:
      - "${REDIS_PORT}:6379"
volumes:
  cs2tactic_data:
